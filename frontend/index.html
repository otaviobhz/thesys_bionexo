<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-light.png" id="favicon" />
    <script>
      // Dynamic favicon based on dark mode
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      function updateFavicon() {
        const isDark = document.documentElement.classList.contains('dark') || mq.matches;
        document.getElementById('favicon').href = isDark ? '/favicon-dark.png' : '/favicon-light.png';
      }
      mq.addEventListener('change', updateFavicon);
      new MutationObserver(updateFavicon).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thesys Bionexo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
